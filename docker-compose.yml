services:
  camptions:
    build: .
    ports:
      - "8000:8000"
    environment:
      - CAMPTIONS_DATABASE_URL=sqlite+aiosqlite:///./data/camptions.db
      - CAMPTIONS_WHISPER_MODEL=small
      - CAMPTIONS_WHISPER_LANGUAGE=en
      - HF_TKN_FILE=./token
    volumes:
      - ./data:/app/data
      - whisper-cache:/root/.cache/huggingface/hub
    restart: unless-stopped

volumes:
  whisper-cache:
