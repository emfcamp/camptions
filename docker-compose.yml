services:
  wlk:
    ports:
      - "9000:9000"
    build:
      context: .
      dockerfile: Dockerfile.wlk
    volumes:
      - whisper-cache:/root/.cache/huggingface/hub
    environment:
      - HF_TOKEN
    restart: unless-stopped

  camptions:
    build: .
    ports:
      - "8000:8000"
    environment:
      - CAMPTIONS_DATABASE_URL=sqlite+aiosqlite:///./data/camptions.db
      - CAMPTIONS_WL_URL=ws://wl:9090
    volumes:
      - ./data:/app/data
      - ./static:/app/static
    depends_on:
      - wlk
    restart: unless-stopped

volumes:
  whisper-cache:
