services:
  wl:
    image: ghcr.io/collabora/whisperlive-cpu:latest
    command: >
      python3 run_server.py
      --port 9090
      --raw_pcm_input
      --max_clients 4
      --max_connection_time 3600
    volumes:
      - whisper-cache:/root/.cache/whisper-live
    restart: unless-stopped

  camptions:
    build: .
    ports:
      - "8000:8000"
    environment:
      - CAMPTIONS_DATABASE_URL=sqlite+aiosqlite:///./data/camptions.db
      - CAMPTIONS_WL_URL=ws://wl:9090
      - CAMPTIONS_WHISPER_MODEL=small.en
      - CAMPTIONS_WHISPER_LANGUAGE=en
      - CAMPTIONS_ADMIN_TOKEN
      - CAMPTIONS_INGEST_TOKEN
    volumes:
      - ./data:/app/data
      - ./static:/app/static
    depends_on:
      - wl
    restart: unless-stopped

  mediamtx:
    image: bluenviron/mediamtx:1.18.2
    # Host networking bypasses Docker NAT — required for WebRTC because UDP
    # ICE candidates have to round-trip cleanly. Ports 8889/tcp (WHIP/WHEP
    # HTTP) and 8189/udp (ICE) are bound directly on the host. Linux/WSL2
    # only — on Mac/Windows Docker Desktop, revert to bridge networking
    # plus explicit MTX_WEBRTCADDITIONALHOSTS.
    network_mode: host
    environment:
      - MTX_WEBRTCADDITIONALHOSTS
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    restart: unless-stopped

volumes:
  whisper-cache:
