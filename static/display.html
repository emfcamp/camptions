<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electromagnetic Field 2026 — Live Captions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --tentative-opacity: 0.6;
            --font-size: 3vw;
            --line-height: 1.4;
            --padding: 2rem;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Raleway', 'Trebuchet MS', 'Liberation Sans', 'Open Sans', sans-serif;
            font-weight: 400;
            font-size: var(--font-size);
            line-height: var(--line-height);
            min-height: 100vh;
            padding: var(--padding);
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* High contrast mode — preserves brand orange where readable */
        body.high-contrast {
            --bg-color: #000000;
            --text-color: #F9E200;
        }

        /* Light mode */
        body.light {
            --bg-color: #ffffff;
            --text-color: #000730;
        }

        #brandMark {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            opacity: 0.55;
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1.05;
            z-index: 90;
            pointer-events: none;
        }

        #brandMark .brand-emblem {
            width: 1.6rem;
            height: 1.6rem;
        }

        #status {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            z-index: 100;
        }

        #status.live {
            background: #2AE28C;
            color: #000730;
        }

        #status.offline {
            background: #5a6580;
            color: #fff;
        }

        #status.disconnected {
            background: #F5515E;
            color: #fff;
        }

        #status.reconnecting {
            background: #F9E200;
            color: #000730;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #captions {
            padding-top: 3rem;
            padding-bottom: 20vw; /* must exceed the JS scroll buffer (15vw) */
        }

        /* One block = one talk. Committed text flows inline; tentative appended at end. */
        .caption-block {
            margin-bottom: 0.5em;
        }

        .block-tentative {
            opacity: var(--tentative-opacity);
            font-style: italic;
        }

        .block-tentative::after {
            content: ' \25ae';
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Divider shown between talks when title is known */
        .block-separator {
            font-size: 0.38em;
            opacity: 0.35;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 0.8em 0 0.2em;
        }

        /* Talk header bar */
        #talkHeader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            padding: 0.6rem var(--padding);
            display: flex;
            align-items: baseline;
            gap: 1rem;
            z-index: 90;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.55em;
        }

        body.light #talkHeader {
            background: rgba(255, 255, 255, 0.85);
            border-bottom-color: rgba(0, 0, 0, 0.1);
        }

        .talk-now-label {
            color: #F77F02;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .talk-title {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .talk-time {
            opacity: 0.5;
            white-space: nowrap;
            flex-shrink: 0;
            margin-left: auto;
        }

        .talk-next {
            opacity: 0.5;
            white-space: nowrap;
            flex-shrink: 0;
            font-size: 0.9em;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="talkHeader" style="display:none">
        <span class="talk-now-label">Now</span>
        <span class="talk-title" id="talkTitle"></span>
        <span class="talk-time" id="talkTime"></span>
        <span class="talk-next" id="talkNext"></span>
    </div>
    <div id="status" class="disconnected">Connecting...</div>
    <div id="captions"></div>
    <div id="brandMark" aria-hidden="true">
        <svg class="brand-emblem" viewBox="0 0 100 140" fill="none">
            <line x1="50" y1="6" x2="50" y2="134" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
            <circle cx="50" cy="70" r="20" stroke="currentColor" stroke-width="5" fill="none"/>
            <path d="M37 70 Q43 60 50 70 T63 70" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round"/>
            <ellipse cx="50" cy="70" rx="34" ry="9" stroke="currentColor" stroke-width="5" fill="none" transform="rotate(-22 50 70)"/>
            <g fill="currentColor">
                <path d="M28 22 L30 28 L36 30 L30 32 L28 38 L26 32 L20 30 L26 28 Z"/>
                <path d="M40 12 L41 15 L44 16 L41 17 L40 20 L39 17 L36 16 L39 15 Z"/>
                <path d="M22 38 L23 40 L25 41 L23 42 L22 44 L21 42 L19 41 L21 40 Z"/>
            </g>
        </svg>
        <span>Electromagnetic Field <span class="brand-year">2026</span></span>
    </div>

    <script>
        // Configuration: venue from URL path (/display/{id}), with legacy ?venue= fallback
        const params = new URLSearchParams(window.location.search);
        const pathMatch = window.location.pathname.match(/^\/display\/([^/]+)\/?$/);
        const venue = (pathMatch ? decodeURIComponent(pathMatch[1]) : params.get('venue')) || 'stage-a';
        const mode = params.get('mode') || 'dark';
        const fontSize = params.get('fontSize');
        const maxLines = parseInt(params.get('maxLines')) || 8;

        if (mode === 'light') document.body.classList.add('light');
        if (mode === 'high-contrast') document.body.classList.add('high-contrast');
        if (fontSize) document.documentElement.style.setProperty('--font-size', fontSize);

        // Rolling word limit for the current block — prevents accumulation on long talks.
        const MAX_WORDS = Math.max(maxLines * 12, 80);

        // State
        let ws = null;
        let reconnectAttempts = 0;
        let currentBlock = null;      // <p class="caption-block"> for the current talk/session
        let currentTalkTitle = null;
        let scrollAnimId = null;

        const captionsEl = document.getElementById('captions');
        const statusEl = document.getElementById('status');

        // --- connection --------------------------------------------------

        function setStatus(cls, text) {
            statusEl.className = cls;
            statusEl.textContent = text;
        }

        function connect() {
            if (ws) { ws.onclose = null; ws.close(); }
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            setStatus('reconnecting', 'Connecting...');
            ws = new WebSocket(`${protocol}//${window.location.host}/api/captions/stream/${venue}`);
            ws.onopen = () => { reconnectAttempts = 0; };
            ws.onmessage = (e) => { try { handleMessage(JSON.parse(e.data)); } catch (err) { console.error(err); } };
            ws.onclose = () => { setStatus('disconnected', 'Disconnected'); scheduleReconnect(); };
            ws.onerror = console.error;
        }

        function scheduleReconnect() {
            reconnectAttempts++;
            setTimeout(connect, Math.min(1000 * Math.pow(2, Math.min(reconnectAttempts - 1, 5)), 30000));
        }

        function handleMessage(data) {
            if (data.type === 'keepalive') return;
            if (data.type === 'connected') {
                setStatus(data.is_live ? 'live' : 'offline',
                          data.is_live ? 'Connected · Live' : 'Connected · Offline');
                return;
            }
            if (data.type === 'venue_live')      { setStatus('live', 'Connected · Live'); return; }
            if (data.type === 'venue_offline')   { setStatus('offline', 'Connected · Offline'); clearTentative(); return; }
            if (data.type === 'session_end')     { clearTentative(); return; }
            if (data.type === 'schedule_update') { updateSchedule(data); return; }
            if (data.type === 'tentative')       updateTentative(data);
            else if (data.type === 'committed')  commitSegment(data);
        }

        // --- block management --------------------------------------------
        // One block = one continuous paragraph per talk/session.
        // New block only when the talk title changes or a new session starts.

        function ensureBlock() {
            if (currentBlock) return currentBlock;
            currentBlock = document.createElement('p');
            currentBlock.className = 'caption-block';
            captionsEl.appendChild(currentBlock);
            return currentBlock;
        }

        function startNewBlock(label) {
            clearTentative();
            currentBlock = null;
            if (label) {
                const sep = document.createElement('div');
                sep.className = 'block-separator';
                sep.textContent = label;
                captionsEl.appendChild(sep);
            }
            // Keep DOM lean — trim oldest blocks + separators
            while (captionsEl.children.length > 6) captionsEl.firstChild.remove();
        }

        function clearTentative() {
            if (!currentBlock) return;
            const t = currentBlock.querySelector('.block-tentative');
            if (t) t.remove();
        }

        function trimBlock(block) {
            // Trim committed text nodes when the block grows too long.
            // Leaves the tentative span intact.
            const t = block.querySelector('.block-tentative');
            let text = '';
            for (const node of block.childNodes) {
                if (node.nodeType === Node.TEXT_NODE) text += node.textContent;
            }
            const words = text.trim().split(/\s+/).filter(Boolean);
            if (words.length <= MAX_WORDS) return;
            block.textContent = words.slice(-MAX_WORDS).join(' ');
            if (t) block.appendChild(t);
        }

        // --- caption rendering -------------------------------------------

        function commitSegment(data) {
            const block = ensureBlock();
            clearTentative();
            const sep = block.textContent.trim().length > 0 ? ' ' : '';
            block.appendChild(document.createTextNode(sep + data.text));
            trimBlock(block);
            scrollToBottom();
        }

        function updateTentative(data) {
            const block = ensureBlock();
            let t = block.querySelector('.block-tentative');
            if (!t) {
                t = document.createElement('span');
                t.className = 'block-tentative';
                block.appendChild(t);
            }
            t.textContent = (block.textContent.trim() ? ' ' : '') + data.text;
            scrollToBottom();
        }

        // --- schedule ----------------------------------------------------

        function updateSchedule(data) {
            const header = document.getElementById('talkHeader');
            if (!data.now || !data.now.title) { header.style.display = 'none'; return; }
            if (data.now.title !== currentTalkTitle) {
                currentTalkTitle = data.now.title;
                startNewBlock(data.now.title);
            }
            document.getElementById('talkTitle').textContent = data.now.title;
            document.getElementById('talkTime').textContent =
                data.now.start_time && data.now.end_time
                    ? `${data.now.start_time}–${data.now.end_time}` : '';
            document.getElementById('talkNext').textContent =
                data.next && data.next.title ? `Next: ${data.next.title}` : '';
            header.style.display = 'flex';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Buffer keeps scrollY away from the absolute bottom, absorbing tentative→committed
        // shrinkage without triggering a browser scroll-clamp (which causes visible jumps).
        // Must be less than the CSS padding-bottom (20vw) so the last line stays visible.
        const SCROLL_BUFFER = () => window.innerWidth * 0.15; // 15vw

        function scrollToBottom(instant = false) {
            if (scrollAnimId) { cancelAnimationFrame(scrollAnimId); scrollAnimId = null; }
            const getTarget = () => Math.max(0,
                document.documentElement.scrollHeight - window.innerHeight - SCROLL_BUFFER());
            if (instant) { window.scrollTo(0, getTarget()); return; }
            if (getTarget() - window.scrollY < 1) return;
            let lastT = null;
            function step(t) {
                if (lastT === null) lastT = t;
                const dt = Math.min((t - lastT) / 1000, 0.1);
                lastT = t;
                const target = getTarget();
                const gap = target - window.scrollY;
                if (gap < 1) { scrollAnimId = null; return; }
                window.scrollTo(0, window.scrollY + gap * (1 - Math.exp(-dt / 0.4)));
                scrollAnimId = requestAnimationFrame(step);
            }
            scrollAnimId = requestAnimationFrame(step);
        }

        // --- history -----------------------------------------------------

        async function loadHistory() {
            // Load one screen's worth of history so the display isn't blank on reconnect.
            // Segments are appended to the initial block; trimBlock limits to MAX_WORDS.
            try {
                const res = await fetch(`/api/captions/history/${venue}?limit=50`);
                if (!res.ok) return;
                const data = await res.json();
                const segments = (data.segments || []).filter(s => s.text && s.text.trim());
                if (segments.length === 0) return;
                const block = ensureBlock();
                block.appendChild(document.createTextNode(segments.map(s => s.text.trim()).join(' ')));
                trimBlock(block);
                scrollToBottom(true); // jump instantly on initial load
            } catch (e) {
                console.error('History load failed:', e);
            }
        }

        // --- init --------------------------------------------------------

        loadHistory().then(connect);

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && (!ws || ws.readyState !== WebSocket.OPEN)) {
                reconnectAttempts = 0;
                connect();
            }
        });

        document.body.addEventListener('dblclick', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });
    </script>
</body>
</html>
