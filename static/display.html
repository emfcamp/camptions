<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electromagnetic Field 2026 — Live Captions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --tentative-opacity: 0.6;
            --font-size: 3vw;
            --line-height: 1.4;
            --padding: 2rem;
        }

        html, body {
            height: 100%;
        }

        body {
            position: relative;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Raleway', 'Trebuchet MS', 'Liberation Sans', 'Open Sans', sans-serif;
            font-weight: 400;
            font-size: var(--font-size);
            line-height: var(--line-height);
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url('/static/bg-3.png');
            background-size: cover;
            background-position: center;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }

        #brandMark {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            opacity: 0.55;
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1.05;
            z-index: 90;
            pointer-events: none;
        }

        #brandMark .brand-emblem {
            width: 1.6rem;
            height: 1.6rem;
        }

        #qrCode {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            z-index: 90;
            opacity: 0.8;
        }

        #status {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            z-index: 100;
        }

        #status.live        { background: #2AE28C; color: #000730; }
        #status.offline     { background: #5a6580; color: #fff; }
        #status.disconnected { background: #F5515E; color: #fff; }
        #status.paused      { background: #F9E200; color: #000730; }
        #status.reconnecting {
            background: #F9E200;
            color: #000730;
            animation: pulse 1s infinite;
        }

        /* Paused banner — large, centred between the brand mark and QR
           code at the bottom of the display. Sits above the caption area
           and is visually unmissable. */
        #pausedBanner {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            color: #F9E200;
            font-size: 2.5vw;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-align: center;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
            z-index: 95;
            pointer-events: none;
            white-space: nowrap;
        }

        #pausedBanner[hidden] { display: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.5; }
        }

        /* Caption area — fixed viewport, clips overflow at top */
        #captions {
            position: fixed;
            inset: 0;
            overflow: hidden;
            margin: 4rem var(--padding) 6rem;
            z-index: 1;
        }

        /*
         * Grid anchored to the top of the container. JS applies a negative
         * translateY to keep the bottom line visible. The 3s ease-out
         * transition gives the slow, smooth upward scroll effect.
         */
        #captionsInner {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            line-height: var(--line-height);
            pointer-events: none;
            transition: transform 3s ease-out;
            transform: translateY(0);
        }

        /* Committed segments and the trailing tentative both flow inline. */
        .caption-segment {
            pointer-events: auto;
        }

        .caption-tentative {
            opacity: var(--tentative-opacity);
        }

        .caption-tentative::after {
            content: ' \25ae';
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        /* Talk header bar */
        #talkHeader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            padding: 0.6rem var(--padding);
            display: flex;
            align-items: baseline;
            gap: 1rem;
            z-index: 90;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.55em;
        }

        .talk-now-label {
            color: #F77F02;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .talk-title {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .talk-time {
            opacity: 0.5;
            white-space: nowrap;
            flex-shrink: 0;
            margin-left: auto;
        }

        .talk-next {
            opacity: 0.5;
            white-space: nowrap;
            flex-shrink: 0;
            font-size: 0.9em;
        }
    </style>
</head>

<body>
    <div id="talkHeader" style="display:none">
        <span class="talk-now-label">Now</span>
        <span class="talk-title" id="talkTitle"></span>
        <span class="talk-time" id="talkTime"></span>
        <span class="talk-next" id="talkNext"></span>
    </div>
    <div id="status" class="disconnected">Connecting...</div>
    <div id="pausedBanner" hidden>Transcription paused</div>
    <div id="captions" role="region" aria-live="polite" aria-label="Live captions">
        <div id="captionsInner"></div>
    </div>
    <div id="brandMark" aria-hidden="true">
        <svg class="brand-emblem" viewBox="0 0 100 140" fill="none">
            <line x1="50" y1="6" x2="50" y2="134" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
            <circle cx="50" cy="70" r="20" stroke="currentColor" stroke-width="5" fill="none"/>
            <path d="M37 70 Q43 60 50 70 T63 70" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round"/>
            <ellipse cx="50" cy="70" rx="34" ry="9" stroke="currentColor" stroke-width="5" fill="none" transform="rotate(-22 50 70)"/>
            <g fill="currentColor">
                <path d="M28 22 L30 28 L36 30 L30 32 L28 38 L26 32 L20 30 L26 28 Z"/>
                <path d="M40 12 L41 15 L44 16 L41 17 L40 20 L39 17 L36 16 L39 15 Z"/>
                <path d="M22 38 L23 40 L25 41 L23 42 L22 44 L21 42 L19 41 L21 40 Z"/>
            </g>
        </svg>
        <span>Electromagnetic Field <span class="brand-year">2026</span></span>
    </div>
    <div id="qrCode" aria-hidden="true"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/static/captions-client.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const pathMatch = location.pathname.match(/^\/display\/([^/]+)\/?$/);
        const venue = pathMatch ? decodeURIComponent(pathMatch[1]) : params.get('venue') || 'stage-a';
        const mode = params.get('mode') || 'dark';
        const fontSize = params.get('fontSize');

        const qrUrl = `https://captions.emf.camp/v/${encodeURIComponent(venue)}`;
        new QRCode(document.getElementById('qrCode'), {
            text: qrUrl,
            width: 128,
            height: 128,
            colorDark: '#ffffff',
            colorLight: '#000000',
            correctLevel: QRCode.CorrectLevel.L,
        });

        if (mode === 'light') document.body.classList.add('light');
        if (mode === 'high-contrast') document.body.classList.add('high-contrast');
        if (fontSize) document.documentElement.style.setProperty('--font-size', fontSize);

        const statusEl = document.getElementById('status');
        const talkHeader = document.getElementById('talkHeader');
        const talkTitleEl = document.getElementById('talkTitle');
        const talkTimeEl = document.getElementById('talkTime');
        const talkNextEl = document.getElementById('talkNext');
        const captionsViewport = document.getElementById('captions');
        const captionsInner = document.getElementById('captionsInner');
        const pausedBannerEl = document.getElementById('pausedBanner');

        // Slowly scroll content up as it grows, anchored to the bottom of the
        // viewport. The CSS 3s ease-out transition on captionsInner makes it smooth.
        function updateDisplayPosition() {
            const available = captionsViewport.clientHeight;
            const contentHeight = captionsInner.scrollHeight;
            if (contentHeight > available) {
                const lineHeight = parseFloat(getComputedStyle(document.body).lineHeight);
                captionsInner.style.transform = `translateY(${available - contentHeight - 2 * lineHeight}px)`;
            }
        }

        // Reads the currently-rendered translateY (i.e. the value the CSS
        // transition is animating through right now, not the target). We
        // need this to snap accurately when trim fires mid-animation.
        function getCurrentTranslateY() {
            const t = getComputedStyle(captionsInner).transform;
            if (!t || t === 'none') return 0;
            try { return new DOMMatrix(t).m42; } catch { return 0; }
        }

        const client = new CaptionsClient({
            venue,
            containerEl: captionsInner,
            // The big screen only needs a sliver of context — anything
            // beyond a handful of lines just scrolls off the top anyway.
            // Keep memory low for long-running display sessions.
            historyLimit: 20,
            maxBlocks: 30,
            onStatus(cls, text) {
                statusEl.className = cls;
                statusEl.textContent = text;
            },
            onSessionStart() {
                captionsInner.style.transform = 'translateY(0)';
            },
            onSessionEnd() {},
            onScheduleUpdate(data) {
                if (!data.now || !data.now.title) {
                    talkHeader.style.display = 'none';
                    return;
                }
                talkTitleEl.textContent = data.now.title;
                talkTimeEl.textContent = data.now.start_time && data.now.end_time
                    ? `${data.now.start_time}–${data.now.end_time}` : '';
                talkNextEl.textContent = data.next && data.next.title
                    ? `Next: ${data.next.title}` : '';
                talkHeader.style.display = 'flex';
            },
            onNewBlock() { updateDisplayPosition(); },
            onPausedChange(paused) { pausedBannerEl.hidden = !paused; },
            onTrim(delta) {
                // Front segments were evicted and the rendered content
                // shrank by `delta` px. Because translateY is animated by
                // a 3 s CSS transition but contentHeight changed instantly,
                // visible_bottom (= translateY + contentHeight) jumps up
                // by `delta` and then crawls back over 3 s. Snap translateY
                // forward by `delta` without a transition so the bottom
                // stays put; the next updateDisplayPosition() then
                // animates only the genuine new-segment delta.
                if (delta <= 0) return;
                const target = getCurrentTranslateY() + delta;
                captionsInner.style.transition = 'none';
                captionsInner.style.transform = `translateY(${target}px)`;
                // Force a reflow so the no-transition assignment commits
                // before the stylesheet's transition is restored.
                void captionsInner.offsetHeight;
                captionsInner.style.transition = '';
            },
        });

        client.init();

        document.body.addEventListener('dblclick', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });
    </script>
</body>

</html>
