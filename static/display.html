<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electromagnetic Field 2026 — Live Captions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --tentative-opacity: 0.6;
            --font-size: 3vw;
            --line-height: 1.4;
            --padding: 2rem;
        }

        html, body {
            height: 100%;
        }

        body {
            position: relative;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Raleway', 'Trebuchet MS', 'Liberation Sans', 'Open Sans', sans-serif;
            font-weight: 400;
            font-size: var(--font-size);
            line-height: var(--line-height);
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url('/static/bg-3.png');
            background-size: cover;
            background-position: center;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }

        #qrCode {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            z-index: 90;
            opacity: 0.8;
        }

        #status {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            z-index: 100;
        }

        #status.live        { background: #2AE28C; color: #000730; }
        #status.offline     { background: #5a6580; color: #fff; }
        #status.disconnected { background: #F5515E; color: #fff; }
        #status.paused      { background: #F9E200; color: #000730; }
        #status.reconnecting {
            background: #F9E200;
            color: #000730;
            animation: pulse 1s infinite;
        }

        /* Paused banner — large, centred between the brand mark and QR
           code at the bottom of the display. Sits above the caption area
           and is visually unmissable. */
        #pausedBanner {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            color: #F9E200;
            font-size: 2.5vw;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-align: center;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
            z-index: 95;
            pointer-events: none;
            white-space: nowrap;
        }

        #pausedBanner[hidden] { display: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.5; }
        }

        /* Caption area — fixed viewport, clips overflow at top.
           The perspective tapers the text inward at the top (Star Wars
           crawl); the fade to black is done by #topFade, NOT a mask — a
           CSS mask over scrolling content forces a per-frame re-raster
           that makes the scroll stutter on a Raspberry Pi. */
        #captions {
            position: fixed;
            inset: 0;
            overflow: hidden;
            margin: 4rem var(--padding) 6rem;
            z-index: 1;
            contain: layout size;
            perspective: 60vw;
            perspective-origin: center bottom;
        }

        /* Static gradient overlay — the captions scroll underneath it, so the
           GPU only blends two layers rather than re-masking moving content.
           Cheap on a Pi. Works because the page background is solid black. */
        #topFade {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 42vh;
            z-index: 2;
            pointer-events: none;
            background: linear-gradient(to bottom,
                #000 0%,
                rgba(0, 0, 0, 0.85) 28%,
                transparent 100%);
        }

        /*
         * Tilt stage — rotates the whole caption plane back at the top so it
         * tapers toward the middle (the perspective on #captions does the
         * foreshortening). Kept separate from #captionsInner because JS owns
         * that element's transform for the scroll animation.
         */
        #captionsStage {
            position: absolute;
            inset: 0;
            transform: rotateX(18deg);
            transform-origin: center bottom;
        }

        /*
         * Grid anchored to the top of the container. JS applies a negative
         * translateY to keep the bottom line visible. The 1.5s ease-out
         * transition gives a smooth upward scroll effect.
         */
        #captionsInner {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            line-height: var(--line-height);
            pointer-events: none;
            transition: transform 3s ease-out;
            transform: translateY(0);
            will-change: transform;
        }

        /* Each frozen caption line is its own block (one visual row), so
           purging whole lines off the top never reflows the lines below. */
        .caption-line {
            display: block;
        }

        /* Committed segments and the trailing tentative both flow inline. */
        .caption-segment {
            pointer-events: auto;
        }

        .caption-tentative {
            opacity: var(--tentative-opacity);
        }

</style>
</head>

<body>
    <div id="status" class="disconnected">Connecting...</div>
    <div id="pausedBanner" hidden>Transcription paused</div>
    <div id="captions" role="region" aria-live="polite" aria-label="Live captions">
        <div id="captionsStage">
            <div id="captionsInner"></div>
        </div>
    </div>
    <div id="topFade" aria-hidden="true"></div>
    <div id="qrCode" aria-hidden="true"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/static/captions-client.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const pathMatch = location.pathname.match(/^\/display\/([^/]+)\/?$/);
        const venue = pathMatch ? decodeURIComponent(pathMatch[1]) : params.get('venue') || 'stage-a';
        const fontSize = params.get('fontSize');

        const qrUrl = `https://stages.emf.camp/v/${encodeURIComponent(venue)}`;
        new QRCode(document.getElementById('qrCode'), {
            text: qrUrl,
            width: 200,
            height: 200,
            colorDark: '#ffffff',
            colorLight: '#000000',
            correctLevel: QRCode.CorrectLevel.L,
        });

        if (fontSize) document.documentElement.style.setProperty('--font-size', fontSize);

        const statusEl = document.getElementById('status');
        const captionsViewport = document.getElementById('captions');
        const captionsInner = document.getElementById('captionsInner');
        const pausedBannerEl = document.getElementById('pausedBanner');

        // ResizeObserver fires only when captionsInner's dimensions change (i.e.
        // text wraps to a new line), not on every text content update. This avoids
        // forced synchronous layout reads that cause stutter on low-power hardware.
        let viewportHeight = captionsViewport.clientHeight;
        let lineHeightPx = 0;
        // True until the first non-trivial position update, so the initial
        // history pre-fill snaps to the bottom rather than animating from top.
        let _needsInitialSnap = true;
        let _positionDebounceTimer = null;
        // Last applied translateY (target trajectory, not the mid-animation
        // value). The scroll is clamped to never exceed this, so the display
        // only ever scrolls upward — brief content-height shrinks don't bounce
        // it back down.
        let _lastTranslateY = 0;

        function getLineHeight() {
            if (!lineHeightPx) lineHeightPx = parseFloat(getComputedStyle(document.body).lineHeight);
            return lineHeightPx;
        }
        function applyTransform(contentHeight) {
            if (contentHeight <= viewportHeight) {
                captionsInner.style.transform = 'translateY(0)';
                _lastTranslateY = 0;
                return;
            }
            let target = viewportHeight - contentHeight - 2 * getLineHeight();
            if (_needsInitialSnap) {
                _needsInitialSnap = false;
                captionsInner.style.transition = 'none';
                captionsInner.style.transform = `translateY(${target}px)`;
                requestAnimationFrame(() => { captionsInner.style.transition = ''; });
            } else {
                // Upward-only: never let the transform move down (more
                // positive) than where it already is.
                target = Math.min(target, _lastTranslateY);
                captionsInner.style.transform = `translateY(${target}px)`;
            }
            _lastTranslateY = target;
        }
        window.addEventListener('resize', () => { viewportHeight = captionsViewport.clientHeight; });

        const positionObserver = new ResizeObserver(entries => {
            const entry = entries[entries.length - 1];
            const h = entry.borderBoxSize?.[0]?.blockSize ?? entry.contentRect.height;
            // Debounce: collapse rapid successive changes (e.g. bulk history
            // load) into one position update so transitions don't restart
            // repeatedly and cause visual jumping.
            clearTimeout(_positionDebounceTimer);
            _positionDebounceTimer = setTimeout(() => applyTransform(h), 50);
        });
        positionObserver.observe(captionsInner);

        // Read the currently-animated translateY (not the target) so onTrim
        // can snap the position mid-animation without a visible jump.
        function getCurrentTranslateY() {
            const t = getComputedStyle(captionsInner).transform;
            if (!t || t === 'none') return 0;
            try { return new DOMMatrix(t).m42; } catch { return 0; }
        }

        // Silence indicator: once 120 s pass with no new committed/tentative
        // text, insert a blank line every 15 s so the display keeps visibly
        // advancing rather than looking frozen. Keeps running while paused —
        // it's driven purely by wall-clock silence, not connection state.
        // Caps at maxLines (20) blank lines: by then every real caption has
        // already scrolled off, so inserting more would have no visible
        // effect.
        const SILENCE_THRESHOLD_MS = 120_000;
        const BLANK_LINE_INTERVAL_MS = 15_000;
        const MAX_BLANK_LINES = 20;
        let lastContentTime = Date.now();
        let blankLinesInserted = 0;
        setInterval(() => {
            if (Date.now() - lastContentTime < SILENCE_THRESHOLD_MS) return;
            if (blankLinesInserted >= MAX_BLANK_LINES) return;
            client.forceNewLine();
            blankLinesInserted += 1;
        }, BLANK_LINE_INTERVAL_MS);

        const client = new CaptionsClient({
            venue,
            containerEl: captionsInner,
            // The big screen only needs a sliver of context — anything
            // beyond a handful of lines just scrolls off the top anyway.
            // Keep memory low for long-running display sessions.
            historyLimit: 20,
            // Line mode: bake committed text into fixed single-row blocks and
            // purge whole lines off the top, so purging never reflows (and
            // jitters) the lines still on screen.
            lineMode: true,
            maxLines: 20,
            onStatus(cls, text) {
                statusEl.className = cls;
                statusEl.textContent = text;
            },
            onSessionStart() {
                captionsInner.style.transform = 'translateY(0)';
                _lastTranslateY = 0;
                lastContentTime = Date.now();
                blankLinesInserted = 0;
            },
            onSessionEnd() {},
            onNewBlock() {
                // Real content (committed or tentative) arrived — reset the
                // silence clock. ResizeObserver handles position updates.
                lastContentTime = Date.now();
                blankLinesInserted = 0;
            },
            onPausedChange(paused) { pausedBannerEl.hidden = !paused; },
            onTrim(delta) {
                // Front segments were evicted; content shrank by `delta` px
                // instantly while translateY is still mid-animation. Snap
                // translateY forward by delta (no transition) so the visible
                // bottom stays put; ResizeObserver then animates the real delta.
                if (delta <= 0) return;
                const target = getCurrentTranslateY() + delta;
                captionsInner.style.transition = 'none';
                captionsInner.style.transform = `translateY(${target}px)`;
                void captionsInner.offsetHeight; // flush before restoring transition
                captionsInner.style.transition = '';
                // Front segments were evicted, so content shrank by `delta`;
                // the recomputed target will legitimately move down by the same
                // amount to keep the bottom static. Raise the clamp baseline so
                // the upward-only clamp doesn't block that compensation.
                _lastTranslateY += delta;
            },
        });

        client.init();

        document.body.addEventListener('dblclick', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });
    </script>
</body>

</html>
