<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electromagnetic Field 2026 — Live Captions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --tentative-opacity: 0.6;
            --font-size: 3vw;
            --line-height: 1.4;
            --padding: 2rem;
        }

        html,
        body {
            height: 100%;
        }

        body {
            position: relative;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Raleway', 'Trebuchet MS', 'Liberation Sans', 'Open Sans', sans-serif;
            font-weight: 400;
            font-size: var(--font-size);
            line-height: var(--line-height);
            margin: 0;
            padding: 0;
            overflow: hidden;
            --bg-color: #000000;
            --text-color: #ffffff;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url('/static/bg-3.png');
            background-size: cover;
            background-position: center;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }

        #brandMark {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            opacity: 0.55;
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1.05;
            z-index: 90;
            pointer-events: none;
        }

        #brandMark .brand-emblem {
            width: 1.6rem;
            height: 1.6rem;
        }

        #status {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            z-index: 100;
        }

        #status.live {
            background: #2AE28C;
            color: #000730;
        }

        #status.offline {
            background: #5a6580;
            color: #fff;
        }

        #status.disconnected {
            background: #F5515E;
            color: #fff;
        }

        #status.reconnecting {
            background: #F9E200;
            color: #000730;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        #captions {
            position: absolute;
            inset: 0;
            overflow: hidden;
            margin: 4rem;
        }

        #captionsInner {
            position: absolute;
            inset: 0;
            display: grid;
            align-items: end;
            min-height: 100%;
            gap: 0.5rem;
            pointer-events: none;
            transition: transform 3s ease-out;
            transform: translateY(0);
            margin-bottom: 6rem;
        }

        #captionsInner>* {
            pointer-events: auto;
        }

        .caption-block {
            margin-bottom: 0.5em;
        }

        .block-tentative {
            opacity: var(--tentative-opacity);
        }

        .block-tentative::after {
            content: ' \25ae';
            animation: blink 1s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* Divider shown between talks when title is known */
        .block-separator {
            font-size: 0.38em;
            opacity: 0.35;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 0.8em 0 0.2em;
        }

        /* Talk header bar */
        #talkHeader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            padding: 0.6rem var(--padding);
            display: flex;
            align-items: baseline;
            gap: 1rem;
            z-index: 90;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.55em;
        }

        body.light #talkHeader {
            background: rgba(255, 255, 255, 0.85);
            border-bottom-color: rgba(0, 0, 0, 0.1);
        }

        .talk-now-label {
            color: #F77F02;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .talk-title {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .talk-time {
            opacity: 0.5;
            white-space: nowrap;
            flex-shrink: 0;
            margin-left: auto;
        }

        .talk-next {
            opacity: 0.5;
            white-space: nowrap;
            flex-shrink: 0;
            font-size: 0.9em;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div id="talkHeader" style="display:none">
        <span class="talk-now-label">Now</span>
        <span class="talk-title" id="talkTitle"></span>
        <span class="talk-time" id="talkTime"></span>
        <span class="talk-next" id="talkNext"></span>
    </div>
    <div id="status" class="disconnected">Connecting...</div>
    <div id="captions" role="region" aria-live="polite" aria-label="Live captions">
        <div id="captionsInner">
            <div id="captionText"></div>
        </div>
    </div>
    <div id="brandMark" aria-hidden="true">
        <svg class="brand-emblem" viewBox="0 0 100 140" fill="none">
            <line x1="50" y1="6" x2="50" y2="134" stroke="currentColor" stroke-width="5" stroke-linecap="round" />
            <circle cx="50" cy="70" r="20" stroke="currentColor" stroke-width="5" fill="none" />
            <path d="M37 70 Q43 60 50 70 T63 70" stroke="currentColor" stroke-width="4" fill="none"
                stroke-linecap="round" />
            <ellipse cx="50" cy="70" rx="34" ry="9" stroke="currentColor" stroke-width="5" fill="none"
                transform="rotate(-22 50 70)" />
            <g fill="currentColor">
                <path d="M28 22 L30 28 L36 30 L30 32 L28 38 L26 32 L20 30 L26 28 Z" />
                <path d="M40 12 L41 15 L44 16 L41 17 L40 20 L39 17 L36 16 L39 15 Z" />
                <path d="M22 38 L23 40 L25 41 L23 42 L22 44 L21 42 L19 41 L21 40 Z" />
            </g>
        </svg>
        <span>Electromagnetic Field <span class="brand-year">2026</span></span>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const pathMatch = location.pathname.match(/^\/display\/([^/]+)\/?$/);
        const venue = pathMatch ? decodeURIComponent(pathMatch[1]) : params.get('venue') || 'stage-a';
        const mode = params.get('mode') || 'dark';
        const fontSize = params.get('fontSize');

        if (mode === 'light') document.body.classList.add('light');
        if (mode === 'high-contrast') document.body.classList.add('high-contrast');
        if (fontSize) document.documentElement.style.setProperty('--font-size', fontSize);

        const captionsEl = document.getElementById('captionText');
        const captionsViewport = document.getElementById('captions');
        const captionsContainer = document.getElementById('captionsInner');
        const statusEl = document.getElementById('status');
        const talkHeader = document.getElementById('talkHeader');
        const talkTitleEl = document.getElementById('talkTitle');
        const talkTimeEl = document.getElementById('talkTime');
        const talkNextEl = document.getElementById('talkNext');

        let ws = null;
        let reconnectAttempts = 0;
        let currentBlock = null;
        let currentTalkTitle = null;
        let currentTranslate = 0;

        function setStatus(state, text) {
            statusEl.className = state;
            statusEl.textContent = text;
        }

        function wsUrl() {
            const scheme = location.protocol === 'https:' ? 'wss:' : 'ws:';
            return `${scheme}//${location.host}/api/captions/stream/${venue}`;
        }

        function connect() {
            if (ws) {
                ws.onclose = null;
                ws.close();
            }
            setStatus('reconnecting', 'Connecting...');
            ws = new WebSocket(wsUrl());
            ws.onopen = () => { reconnectAttempts = 0; };
            ws.onmessage = event => { handleMessage(JSON.parse(event.data)); };
            ws.onclose = () => {
                setStatus('disconnected', 'Disconnected');
                scheduleReconnect();
            };
            ws.onerror = console.error;
        }

        function scheduleReconnect() {
            reconnectAttempts += 1;
            const delay = Math.min(1000 * 2 ** Math.min(reconnectAttempts - 1, 5), 30000);
            setTimeout(connect, delay);
        }

        function handleMessage(data) {
            if (data.type === 'keepalive') return;
            if (data.type === 'connected') {
                setStatus(data.is_live ? 'live' : 'offline', data.is_live ? 'Connected · Live' : 'Connected · Source Offline');
                return;
            }
            if (data.type === 'venue_live') {
                setStatus('live', 'Connected · Live');
                return;
            }
            if (data.type === 'venue_offline') {
                setStatus('offline', 'Connected · Source Offline');
                clearTentative();
                return;
            }
            if (data.type === 'session_end') {
                clearTentative();
                return;
            }
            if (data.type === 'schedule_update') {
                updateSchedule(data);
                return;
            }
            if (data.type === 'tentative') {
                updateTentative(data);
                return;
            }
            if (data.type === 'committed') {
                commitSegment(data);
                return;
            }
            console.warn('Unhandled message type', data.type);
        }

        function commitSegment(data) {
            clearTentative();
            const prefix = captionsEl.textContent.trim() ? ' ' : '';
            captionsEl.append(prefix + data.text);
            trimContent();
            updateDisplayPosition();
        }

        function updateTentative(data) {
            const prefix = captionsEl.textContent.trim() ? ' ' : '';
            let tentative = captionsEl.querySelector('.block-tentative');
            if (!tentative) {
                tentative = document.createElement('span');
                tentative.className = 'block-tentative';
                captionsEl.appendChild(tentative);
            }
            tentative.textContent = prefix + data.text;
            updateDisplayPosition();
        }

        function clearTentative() {
            const tentative = captionsEl.querySelector('.block-tentative');
            if (tentative) tentative.remove();
        }

        function trimContent() {
            const text = captionsEl.textContent.trim();
            const words = text.split(/\s+/).filter(Boolean);
            if (words.length > 500) {
                captionsEl.textContent = words.slice(-500).join(' ');
            }
        }


        function updateDisplayPosition() {
            const available = captionsViewport.clientHeight;
            const contentHeight = captionsEl.scrollHeight;
            const desired = Math.min(0, available - contentHeight - 200);
            currentTranslate = Math.min(currentTranslate, desired);
            captionsEl.style.transform = `translateY(${currentTranslate}px)`;
        }

        function scrollToBottom() {
            // Display mode stays locked to the bottom via CSS, no browser scrollbar.
        }

        function updateSchedule(data) {
            if (!data.now || !data.now.title) {
                talkHeader.style.display = 'none';
                currentTalkTitle = null;
                return;
            }
            const newTitle = data.now.title;
            if (newTitle !== currentTalkTitle) {
                currentTalkTitle = newTitle;
            }
            talkTitleEl.textContent = newTitle;
            talkTimeEl.textContent = data.now.start_time && data.now.end_time ? `${data.now.start_time}–${data.now.end_time}` : '';
            talkNextEl.textContent = data.next && data.next.title ? `Next: ${data.next.title}` : '';
            talkHeader.style.display = 'flex';
        }

        async function loadHistory() {
            try {
                const response = await fetch(`/api/captions/history/${venue}?limit=50`);
                if (!response.ok) return;
                const data = await response.json();
                const segments = (data.segments || []).filter(s => s.text && s.text.trim());
                if (!segments.length) return;
                captionsEl.textContent = segments.map(s => s.text.trim()).join(' ');
                trimContent();
                updateDisplayPosition();
            } catch (error) {
                console.error('History load failed:', error);
            }
        }

        loadHistory().then(connect);

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && (!ws || ws.readyState !== WebSocket.OPEN)) {
                reconnectAttempts = 0;
                connect();
            }
        });

        document.body.addEventListener('dblclick', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });
    </script>
</body>

</html>
