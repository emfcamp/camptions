<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Electromagnetic Field 2026 — Captions Status</title>
    <!-- Yes, this was vibe coded, Claude is great. -->
    <link rel="stylesheet" href="/static/shared.css">
    <style>
        :root {
            --bg-opacity: 0.08;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Raleway', 'Trebuchet MS', sans-serif;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .header-title {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .header-eyebrow {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        header h1 {
            font-size: 1.75rem;
            font-weight: 700;
        }

        header h1 span { color: var(--accent-color); }

        .header-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: right;
        }

        #refreshIn { font-variant-numeric: tabular-nums; }

        /* System totals bar */
        .totals {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            background: var(--surface-color);
            border-radius: 0.5rem;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
        }

        .total-item {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .total-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        .total-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* Venue grid */
        .venues {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.25rem;
        }

        .venue-card {
            background: var(--surface-color);
            border-radius: 0.5rem;
            padding: 1.25rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            border-left: 3px solid transparent;
            transition: border-color 0.3s;
        }

        .venue-card.live   { border-left-color: var(--success-color); }
        .venue-card.paused { border-left-color: var(--warning-color); }
        .venue-card.offline { border-left-color: var(--text-muted); }

        .venue-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .venue-name {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .status-pill {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
        }

        .status-pill.live    { background: rgba(42,226,140,0.15); color: var(--success-color); }
        .status-pill.paused  { background: rgba(249,226,0,0.12);  color: var(--warning-color); }
        .status-pill.offline { background: rgba(168,179,212,0.12); color: var(--text-muted); }

        .venue-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .venue-subs {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .venue-subs strong { color: var(--text-color); }

        /* Schedule */
        .schedule-block {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 0.65rem;
        }

        .schedule-row {
            display: grid;
            grid-template-columns: 2.5rem 1fr;
            gap: 0.4rem;
            font-size: 0.8rem;
        }

        .schedule-tag {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent-color);
            padding-top: 0.05rem;
        }

        .schedule-row.next .schedule-tag { color: var(--text-muted); }

        .schedule-title {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .schedule-speaker {
            color: var(--text-muted);
            font-size: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .schedule-time {
            color: var(--text-muted);
            font-size: 0.7rem;
        }

        /* Drop warning */
        .venue-drops {
            font-size: 0.8rem;
            color: var(--warning-color);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* Empty / error states */
        .loading {
            color: var(--text-muted);
            text-align: center;
            padding: 3rem;
            font-size: 0.9rem;
        }

        .error-banner {
            background: rgba(245, 81, 94, 0.12);
            border: 1px solid var(--error-color);
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
            color: var(--error-color);
            font-size: 0.875rem;
        }
    </style>
</head>

<body>
<div class="container">

    <header>
        <div class="header-title">
            <span class="header-eyebrow">Electromagnetic Field 2026</span>
            <h1>Captions <span>Status</span></h1>
        </div>
        <div class="header-meta">
            <div id="lastUpdated">Loading…</div>
            <div>Refreshes in <span id="refreshIn">15</span>s</div>
        </div>
    </header>

    <div class="totals" id="totals">
        <div class="total-item">
            <span class="total-label">Venues live</span>
            <span class="total-value" id="totLive">—</span>
        </div>
        <div class="total-item">
            <span class="total-label">Total viewers</span>
            <span class="total-value" id="totSubs">—</span>
        </div>
        <div class="total-item">
            <span class="total-label">Segments today</span>
            <span class="total-value" id="totSegments">—</span>
        </div>
        <div class="total-item" id="totDropsItem" style="display:none">
            <span class="total-label">Drops</span>
            <span class="total-value" id="totDrops">0</span>
        </div>
    </div>

    <div id="errorBanner" class="error-banner" style="display:none">
        ⚠ Cannot reach the captions server — data shown may be stale.
    </div>

    <div class="venues" id="venues">
        <div class="loading">Loading venue data…</div>
    </div>

</div>

<script src="/static/page-utils.js"></script>
<script>
    // Optional admin token from URL: /status?token=xxx gives segment totals.
    const TOKEN = new URLSearchParams(location.search).get('token') || '';

    function authHeaders() {
        return TOKEN ? { 'Authorization': `Bearer ${TOKEN}` } : {};
    }

    function fmtTime(iso) {
        if (!iso) return '';
        try { return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
        catch { return iso; }
    }

    function scheduleBlock(slot, tag) {
        if (!slot || !slot.title) return '';
        const speaker = slot.speaker ? `<div class="schedule-speaker">${escapeHtml(slot.speaker)}</div>` : '';
        const time    = slot.start_time ? `<span class="schedule-time">${fmtTime(slot.start_time)}</span>` : '';
        return `
            <div class="schedule-row ${tag.toLowerCase()}">
                <span class="schedule-tag">${tag}</span>
                <div>
                    <div class="schedule-title">${escapeHtml(slot.title)}</div>
                    ${speaker}${time}
                </div>
            </div>`;
    }

    function setError(show) {
        document.getElementById('errorBanner').style.display = show ? 'block' : 'none';
    }

    async function refresh() {
        try {
            const [venuesRes, schedRes, adminStatsRes] = await Promise.all([
                fetch('/api/venues'),
                fetch('/api/schedule/now-and-next'),
                TOKEN ? fetch('/api/admin/stats', { headers: authHeaders() }) : Promise.resolve(null),
            ]);

            if (!venuesRes.ok) throw new Error(`venues ${venuesRes.status}`);

            const venues     = await venuesRes.json();
            const schedule   = schedRes.ok ? await schedRes.json() : [];
            const adminStats = (adminStatsRes?.ok) ? await adminStatsRes.json() : null;

            setError(false);

            // Schedule lookup.
            const schedMap = {};
            for (const s of (Array.isArray(schedule) ? schedule : [])) schedMap[s.venue_id] = s;

            // Totals bar.
            const totalSubs = venues.reduce((n, v) => n + (v.subscriber_count ?? 0), 0);
            const totalLive = venues.filter(v => v.transcription_enabled && v.is_live).length;
            const totalDrops = venues.reduce((n, v) => n + (v.audio_drops ?? 0) + (v.distribution_drops ?? 0), 0);

            document.getElementById('totLive').textContent     = `${totalLive} / ${venues.length}`;
            document.getElementById('totSubs').textContent     = totalSubs;
            document.getElementById('totSegments').textContent =
                adminStats ? (adminStats.segments?.total ?? '—').toLocaleString() : '—';

            // Drops total (only shown when non-zero).
            const dropsEl = document.getElementById('totDrops');
            const dropsItem = document.getElementById('totDropsItem');
            if (totalDrops > 0) {
                dropsEl.textContent = totalDrops;
                dropsEl.style.color = 'var(--warning-color)';
                dropsItem.style.display = '';
            } else {
                dropsItem.style.display = 'none';
            }

            // Venue cards.
            document.getElementById('venues').innerHTML = venues.map(v => {
                const sched = schedMap[v.id] ?? {};
                const subs  = v.subscriber_count ?? 0;

                let state, label;
                if (!v.transcription_enabled) { state = 'paused';   label = 'Paused';  }
                else if (v.is_live)            { state = 'live';     label = 'Live';    }
                else                           { state = 'offline';  label = 'Offline'; }

                const audioDrop = v.audio_drops ?? 0;
                const distDrop  = v.distribution_drops ?? 0;
                const anyDrops  = audioDrop + distDrop > 0;
                const dropParts = [];
                if (audioDrop > 0) dropParts.push(`${audioDrop} audio`);
                if (distDrop  > 0) dropParts.push(`${distDrop} delivery`);
                const dropsHtml = anyDrops
                    ? `<div class="venue-drops">⚠ ${dropParts.join(' · ')} drop${audioDrop + distDrop !== 1 ? 's' : ''}</div>`
                    : '';

                const schedHtml = (sched.now || sched.next) ? `
                    <div class="schedule-block">
                        ${scheduleBlock(sched.now, 'Now')}
                        ${scheduleBlock(sched.next, 'Next')}
                    </div>` : '';

                return `
                    <div class="venue-card ${state}">
                        <div class="venue-header">
                            <span class="venue-name">${escapeHtml(v.name)}</span>
                            <span class="status-pill ${state}">${label}</span>
                        </div>
                        <div class="venue-subs"><strong>${subs}</strong> viewer${subs !== 1 ? 's' : ''}</div>
                        ${dropsHtml}${schedHtml}
                    </div>`;
            }).join('');

            document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();

        } catch (err) {
            console.error('Status refresh failed:', err);
            setError(true);
            document.getElementById('lastUpdated').textContent = 'Update failed';
        }
    }

    // Countdown + auto-refresh every 15 s.
    const INTERVAL = 15;
    let countdown = INTERVAL;
    function tick() {
        countdown--;
        document.getElementById('refreshIn').textContent = countdown;
        if (countdown <= 0) { countdown = INTERVAL; refresh(); }
    }

    refresh();
    setInterval(tick, 1000);
</script>
</body>
</html>
