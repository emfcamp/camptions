<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#000730">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Electromagnetic Field 2026 — Live Captions</title>
    <!-- Yes, this was vibe coded, Claude is great. -->
    <link rel="manifest" href="/static/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #000730;
            --surface-color: #001a4d;
            --text-color: #ffffff;
            --text-muted: #a8b3d4;
            --accent-color: #F77F02;
            --speaker-color: #F77F02;
            --success-color: #2AE28C;
            --warning-color: #F9E200;
            --error-color: #F5515E;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Raleway', 'Trebuchet MS', 'Liberation Sans', 'Open Sans', sans-serif;
            font-weight: 400;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body.light {
            --bg-color: #ffffff;
            --surface-color: #f5f5f5;
            --text-color: #000730;
            --text-muted: #5a6580;
        }

        header {
            background: var(--surface-color);
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 600;
            font-size: 1.05rem;
            line-height: 1.1;
        }

        .logo-emblem {
            width: 2.4rem;
            height: 2.4rem;
            color: currentColor;
            flex-shrink: 0;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-text .logo-line2 {
            font-weight: 600;
        }

        .logo-text .logo-year {
            color: var(--accent-color);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--error-color);
        }

        .status-dot.live {
            background: var(--success-color);
        }

        .status-dot.offline {
            background: var(--text-muted);
        }

        .status-dot.reconnecting {
            background: var(--warning-color);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .venue-selector {
            background: var(--surface-color);
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .venue-tabs {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .venue-tabs::-webkit-scrollbar {
            display: none;
        }

        .venue-tab {
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            font-size: 0.875rem;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .venue-tab:hover {
            border-color: var(--text-color);
            color: var(--text-color);
        }

        .venue-tab.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: #000730;
            font-weight: 600;
        }

        main {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
        }

        #captions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        /* One block per talk/session — text flows inline within it */
        .caption-block {
            padding: 0.75rem;
            background: var(--surface-color);
            border-radius: 0.5rem;
            border-left: 3px solid var(--success-color);
            animation: slideIn 0.2s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .block-header {
            font-size: 0.7rem;
            color: var(--accent-color);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.35rem;
        }

        .block-text {
            font-size: var(--caption-font-size, 1rem);
            line-height: 1.5;
        }

        /* In-progress text shown inline at the end of the block */
        .block-tentative {
            opacity: 0.6;
            font-style: italic;
        }

        .block-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        footer {
            background: var(--surface-color);
            padding: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .settings {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .font-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .font-btn {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 0.5rem;
            background: var(--bg-color);
            border: 1px solid var(--text-muted);
            color: var(--text-color);
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .font-btn:hover {
            border-color: var(--text-color);
        }

        .theme-toggle {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            background: var(--bg-color);
            border: 1px solid var(--text-muted);
            color: var(--text-color);
            cursor: pointer;
        }

        /* Now playing banner */
        .now-playing {
            background: var(--surface-color);
            border-left: 3px solid var(--accent-color);
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            border-radius: 0.5rem;
        }

        .now-playing-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-color);
            font-weight: 700;
            margin-bottom: 0.2rem;
        }

        .now-playing-title {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.3;
        }

        .now-playing-speaker {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.15rem;
        }

        .now-playing-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.1rem;
        }

        .next-talk {
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(255,255,255,0.08);
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .next-talk-label {
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.65rem;
            font-weight: 600;
            margin-bottom: 0.1rem;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <svg class="logo-emblem" viewBox="0 0 100 140" fill="none" aria-hidden="true">
                <line x1="50" y1="6" x2="50" y2="134" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                <circle cx="50" cy="70" r="20" stroke="currentColor" stroke-width="4" fill="none"/>
                <path d="M37 70 Q43 60 50 70 T63 70" stroke="currentColor" stroke-width="3.5" fill="none" stroke-linecap="round"/>
                <ellipse cx="50" cy="70" rx="34" ry="9" stroke="currentColor" stroke-width="4" fill="none" transform="rotate(-22 50 70)"/>
                <g fill="currentColor">
                    <path d="M28 22 L30 28 L36 30 L30 32 L28 38 L26 32 L20 30 L26 28 Z"/>
                    <path d="M40 12 L41 15 L44 16 L41 17 L40 20 L39 17 L36 16 L39 15 Z"/>
                    <path d="M22 38 L23 40 L25 41 L23 42 L22 44 L21 42 L19 41 L21 40 Z"/>
                </g>
            </svg>
            <div class="logo-text">
                <span>Electromagnetic</span>
                <span class="logo-line2">Field <span class="logo-year">2026</span></span>
            </div>
        </div>
        <div class="status-indicator">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Connecting...</span>
        </div>
    </header>

    <nav class="venue-selector">
        <div class="venue-tabs" id="venueTabs">
            <!-- Populated dynamically -->
        </div>
    </nav>

    <main>
        <div id="nowPlaying" class="now-playing" style="display:none">
            <div class="now-playing-label">Now playing</div>
            <div class="now-playing-title" id="nowTitle"></div>
            <div class="now-playing-speaker" id="nowSpeaker"></div>
            <div class="now-playing-time" id="nowTime"></div>
            <div class="next-talk" id="nextTalk" style="display:none">
                <div class="next-talk-label">Up next</div>
                <div id="nextTitle"></div>
                <div id="nextSpeaker" style="color:var(--text-muted);font-size:0.7rem"></div>
                <div id="nextTime" style="color:var(--text-muted);font-size:0.7rem"></div>
            </div>
        </div>
        <div id="captions">
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">&#127908;</div>
                <p>Waiting for captions...</p>
                <p style="font-size: 0.875rem; margin-top: 0.5rem;">
                    Select a venue above to see live transcription
                </p>
            </div>
        </div>
    </main>

    <footer>
        <div class="settings">
            <div class="font-controls">
                <button class="font-btn" id="fontDecrease">A-</button>
                <button class="font-btn" id="fontIncrease">A+</button>
            </div>
            <button class="theme-toggle" id="themeToggle">&#127769;</button>
        </div>
    </footer>

    <script>
        // Configuration - will be loaded from API
        let venues = [
            { id: 'stage-a', name: 'Stage A' },
            { id: 'stage-b', name: 'Stage B' },
            { id: 'stage-c', name: 'Stage C' },
        ];

        // State — venue picked from URL path (/v/{id}), then localStorage, then default
        function venueFromPath() {
            const m = window.location.pathname.match(/^\/v\/([^/]+)\/?$/);
            return m ? decodeURIComponent(m[1]) : null;
        }

        let currentVenue = venueFromPath() || localStorage.getItem('venue') || 'stage-a';
        if (venueFromPath()) localStorage.setItem('venue', currentVenue);
        let ws = null;
        let fontSize = parseFloat(localStorage.getItem('fontSize')) || 1;
        let isDarkMode = localStorage.getItem('theme') !== 'light';
        let reconnectAttempts = 0;
        let currentBlock = null;   // .caption-block card for the current talk/session
        let currentTalk = null;    // title of the current talk, for change detection

        // Elements
        const venueTabsEl = document.getElementById('venueTabs');
        const captionsEl = document.getElementById('captions');
        const emptyStateEl = document.getElementById('emptyState');
        const statusDotEl = document.getElementById('statusDot');
        const statusTextEl = document.getElementById('statusText');

        // Load venues from API
        async function loadVenues() {
            try {
                const response = await fetch('/api/venues');
                if (response.ok) {
                    const data = await response.json();
                    if (data.length > 0) {
                        venues = data.map(v => ({ id: v.id, name: v.name }));
                    }
                }
            } catch (e) {
                console.warn('Could not load venues from API, using defaults');
            }
            initVenues();
        }

        // Initialize venues
        function initVenues() {
            venueTabsEl.innerHTML = venues.map(v => `
                <button class="venue-tab ${v.id === currentVenue ? 'active' : ''}"
                        data-venue="${v.id}">
                    ${escapeHtml(v.name)}
                </button>
            `).join('');

            venueTabsEl.addEventListener('click', (e) => {
                if (e.target.classList.contains('venue-tab')) {
                    selectVenue(e.target.dataset.venue);
                }
            });
        }

        function selectVenue(venueId, opts = {}) {
            if (venueId === currentVenue) return;

            currentVenue = venueId;
            localStorage.setItem('venue', venueId);

            // Update UI
            document.querySelectorAll('.venue-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.venue === venueId);
            });

            // Update URL — skip when called from popstate to avoid double history entry
            if (!opts.skipPushState) {
                const newPath = `/v/${encodeURIComponent(venueId)}`;
                if (window.location.pathname !== newPath) {
                    history.pushState({ venue: venueId }, '', newPath);
                }
            }

            // Clear captions and reconnect
            clearCaptions();
            connect();
        }

        // Browser back/forward — sync venue with URL
        window.addEventListener('popstate', () => {
            const v = venueFromPath();
            if (v && v !== currentVenue) selectVenue(v, { skipPushState: true });
        });

        function clearCaptions() {
            captionsEl.innerHTML = '';
            captionsEl.appendChild(emptyStateEl);
            emptyStateEl.style.display = 'block';
            document.getElementById('nowPlaying').style.display = 'none';
            currentBlock = null;
            currentTalk = null;
        }

        function setStatus(dot, text) {
            statusDotEl.className = 'status-dot ' + dot;
            statusTextEl.textContent = text;
        }

        function connect() {
            if (ws) {
                ws.onclose = null;
                ws.close();
            }

            setStatus('reconnecting', 'Connecting...');

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/api/captions/stream/${currentVenue}`;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                // Status will be set properly when 'connected' message arrives with is_live
                reconnectAttempts = 0;
            };

            ws.onmessage = (event) => {
                try {
                    handleMessage(JSON.parse(event.data));
                } catch (e) {
                    console.error('Parse error:', e);
                }
            };

            ws.onclose = () => {
                setStatus('', 'Disconnected');
                scheduleReconnect();
            };

            ws.onerror = console.error;
        }

        function scheduleReconnect() {
            reconnectAttempts++;
            const delay = Math.min(1000 * Math.pow(2, Math.min(reconnectAttempts - 1, 5)), 30000);
            setTimeout(connect, delay);
        }

        function handleMessage(data) {
            if (data.type === 'keepalive') return;

            if (data.type === 'connected') {
                setStatus(data.is_live ? 'live' : 'offline',
                          data.is_live ? 'Connected · Live' : 'Connected · Offline');
                return;
            }

            if (data.type === 'venue_live') {
                setStatus('live', 'Connected · Live');
                startNewBlock(currentTalk); // new audio session = new block
                return;
            }

            if (data.type === 'venue_offline') {
                setStatus('offline', 'Connected · Offline');
                clearTentative();
                return;
            }

            if (data.type === 'session_end') {
                clearTentative();
                return;
            }

            if (data.type === 'schedule_update') {
                updateSchedule(data);
                return;
            }

            emptyStateEl.style.display = 'none';

            if (data.type === 'tentative')      updateTentative(data);
            else if (data.type === 'committed') commitSegment(data);
        }

        // --- block management --------------------------------------------
        // One block = one talk card. Committed text flows inline within it.
        // New block on: talk title change, new audio session (venue_live).

        function ensureBlock() {
            if (currentBlock) return currentBlock;

            const wrapper = document.createElement('div');
            wrapper.className = 'caption-block';

            if (currentTalk) {
                const header = document.createElement('div');
                header.className = 'block-header';
                header.textContent = currentTalk;
                wrapper.appendChild(header);
            }

            const textEl = document.createElement('p');
            textEl.className = 'block-text';
            wrapper.appendChild(textEl);

            const timeEl = document.createElement('div');
            timeEl.className = 'block-time';
            timeEl.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            wrapper.appendChild(timeEl);

            captionsEl.appendChild(wrapper);
            currentBlock = wrapper;
            trimBlocks();
            return wrapper;
        }

        function startNewBlock(label) {
            clearTentative();
            currentBlock = null;
        }

        function clearTentative() {
            if (!currentBlock) return;
            const t = currentBlock.querySelector('.block-tentative');
            if (t) t.remove();
        }

        function trimBlocks() {
            const blocks = captionsEl.querySelectorAll('.caption-block');
            while (blocks.length > 20) blocks[0].remove();
        }

        // --- caption rendering -------------------------------------------

        function commitSegment(data) {
            const block = ensureBlock();
            const textEl = block.querySelector('.block-text');
            clearTentative();
            const sep = textEl.textContent.trim().length > 0 ? ' ' : '';
            textEl.appendChild(document.createTextNode(sep + data.text));
            scrollToBottom();
        }

        function updateTentative(data) {
            const block = ensureBlock();
            const textEl = block.querySelector('.block-text');
            let t = textEl.querySelector('.block-tentative');
            if (!t) {
                t = document.createElement('span');
                t.className = 'block-tentative';
                textEl.appendChild(t);
            }
            t.textContent = (textEl.textContent.trim() ? ' ' : '') + data.text;
            scrollToBottom();
        }

        function scrollToBottom() {
            window.scrollTo(0, document.body.scrollHeight);
        }

        function updateSchedule(data) {
            const nowEl = document.getElementById('nowPlaying');
            if (!data.now || !data.now.title) {
                nowEl.style.display = 'none';
                return;
            }
            // New talk = new block
            if (data.now.title !== currentTalk) {
                currentTalk = data.now.title;
                startNewBlock(currentTalk);
            }
            document.getElementById('nowTitle').textContent = data.now.title;
            document.getElementById('nowSpeaker').textContent = data.now.speaker || '';
            document.getElementById('nowTime').textContent =
                data.now.start_time && data.now.end_time
                    ? `${data.now.start_time} – ${data.now.end_time}`
                    : '';
            nowEl.style.display = 'block';

            const nextTalkEl = document.getElementById('nextTalk');
            if (data.next && data.next.title) {
                document.getElementById('nextTitle').textContent = data.next.title;
                document.getElementById('nextSpeaker').textContent = data.next.speaker || '';
                document.getElementById('nextTime').textContent =
                    data.next.start_time ? data.next.start_time : '';
                nextTalkEl.style.display = 'block';
            } else {
                nextTalkEl.style.display = 'none';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        // Font size controls
        function updateFontSize(delta) {
            fontSize = Math.max(0.75, Math.min(2, fontSize + delta));
            localStorage.setItem('fontSize', fontSize);
            document.documentElement.style.setProperty('--caption-font-size', `${fontSize}rem`);
        }

        document.getElementById('fontIncrease').addEventListener('click', () => updateFontSize(0.125));
        document.getElementById('fontDecrease').addEventListener('click', () => updateFontSize(-0.125));

        // Theme toggle
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light', !isDarkMode);
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            document.getElementById('themeToggle').textContent = isDarkMode ? '\u{1F319}' : '\u2600\uFE0F';
        }

        document.getElementById('themeToggle').addEventListener('click', toggleTheme);

        // Initialize
        loadVenues();
        document.body.classList.toggle('light', !isDarkMode);
        document.documentElement.style.setProperty('--caption-font-size', `${fontSize}rem`);
        document.getElementById('themeToggle').textContent = isDarkMode ? '\u{1F319}' : '\u2600\uFE0F';
        connect();

        // Handle visibility
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && (!ws || ws.readyState !== WebSocket.OPEN)) {
                reconnectAttempts = 0;
                connect();
            }
        });
    </script>
</body>
</html>
