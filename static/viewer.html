<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>EMF Captions</title>
    <link rel="manifest" href="/static/manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #1a1a2e;
            --surface-color: #16213e;
            --text-color: #eaeaea;
            --text-muted: #a0a0a0;
            --accent-color: #e94560;
            --speaker-color: #0f4c75;
            --success-color: #22c55e;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body.light {
            --bg-color: #f5f5f5;
            --surface-color: #ffffff;
            --text-color: #1a1a1a;
            --text-muted: #666666;
        }

        header {
            background: var(--surface-color);
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 700;
            font-size: 1.25rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--error-color);
        }

        .status-dot.live {
            background: var(--success-color);
        }

        .status-dot.offline {
            background: var(--text-muted);
        }

        .status-dot.reconnecting {
            background: var(--warning-color);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .venue-selector {
            background: var(--surface-color);
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .venue-tabs {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .venue-tabs::-webkit-scrollbar {
            display: none;
        }

        .venue-tab {
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            font-size: 0.875rem;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .venue-tab:hover {
            border-color: var(--text-color);
            color: var(--text-color);
        }

        .venue-tab.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
        }

        main {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
        }

        #captions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .caption-line {
            padding: 0.75rem;
            background: var(--surface-color);
            border-radius: 0.5rem;
            animation: slideIn 0.2s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .caption-line.tentative {
            opacity: 0.7;
            border-left: 3px solid var(--warning-color);
        }

        .caption-line.committed {
            border-left: 3px solid var(--success-color);
        }

        .speaker-name {
            font-size: 0.75rem;
            color: var(--accent-color);
            margin-bottom: 0.25rem;
            font-weight: 600;
        }

        .caption-text {
            font-size: var(--caption-font-size, 1rem);
            line-height: 1.5;
        }

        .caption-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        footer {
            background: var(--surface-color);
            padding: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .settings {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .font-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .font-btn {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 0.5rem;
            background: var(--bg-color);
            border: 1px solid var(--text-muted);
            color: var(--text-color);
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .font-btn:hover {
            border-color: var(--text-color);
        }

        .theme-toggle {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            background: var(--bg-color);
            border: 1px solid var(--text-muted);
            color: var(--text-color);
            cursor: pointer;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">EMF Captions</div>
        <div class="status-indicator">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Connecting...</span>
        </div>
    </header>

    <nav class="venue-selector">
        <div class="venue-tabs" id="venueTabs">
            <!-- Populated dynamically -->
        </div>
    </nav>

    <main>
        <div id="captions">
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">&#127908;</div>
                <p>Waiting for captions...</p>
                <p style="font-size: 0.875rem; margin-top: 0.5rem;">
                    Select a venue above to see live transcription
                </p>
            </div>
        </div>
    </main>

    <footer>
        <div class="settings">
            <div class="font-controls">
                <button class="font-btn" id="fontDecrease">A-</button>
                <button class="font-btn" id="fontIncrease">A+</button>
            </div>
            <button class="theme-toggle" id="themeToggle">&#127769;</button>
        </div>
    </footer>

    <script>
        // Configuration - will be loaded from API
        let venues = [
            { id: 'stage-a', name: 'Stage A' },
            { id: 'stage-b', name: 'Stage B' },
            { id: 'stage-c', name: 'Stage C' },
        ];

        // State
        let currentVenue = localStorage.getItem('venue') || 'stage-a';
        let ws = null;
        let fontSize = parseFloat(localStorage.getItem('fontSize')) || 1;
        let isDarkMode = localStorage.getItem('theme') !== 'light';
        let reconnectAttempts = 0;
        const maxCaptions = 50;

        // Elements
        const venueTabsEl = document.getElementById('venueTabs');
        const captionsEl = document.getElementById('captions');
        const emptyStateEl = document.getElementById('emptyState');
        const statusDotEl = document.getElementById('statusDot');
        const statusTextEl = document.getElementById('statusText');

        // Load venues from API
        async function loadVenues() {
            try {
                const response = await fetch('/api/venues');
                if (response.ok) {
                    const data = await response.json();
                    if (data.length > 0) {
                        venues = data.map(v => ({ id: v.id, name: v.name }));
                    }
                }
            } catch (e) {
                console.warn('Could not load venues from API, using defaults');
            }
            initVenues();
        }

        // Initialize venues
        function initVenues() {
            venueTabsEl.innerHTML = venues.map(v => `
                <button class="venue-tab ${v.id === currentVenue ? 'active' : ''}"
                        data-venue="${v.id}">
                    ${escapeHtml(v.name)}
                </button>
            `).join('');

            venueTabsEl.addEventListener('click', (e) => {
                if (e.target.classList.contains('venue-tab')) {
                    selectVenue(e.target.dataset.venue);
                }
            });
        }

        function selectVenue(venueId) {
            if (venueId === currentVenue) return;

            currentVenue = venueId;
            localStorage.setItem('venue', venueId);

            // Update UI
            document.querySelectorAll('.venue-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.venue === venueId);
            });

            // Clear captions and reconnect
            clearCaptions();
            connect();
        }

        function clearCaptions() {
            captionsEl.innerHTML = '';
            captionsEl.appendChild(emptyStateEl);
            emptyStateEl.style.display = 'block';
        }

        function setStatus(dot, text) {
            statusDotEl.className = 'status-dot ' + dot;
            statusTextEl.textContent = text;
        }

        function connect() {
            if (ws) {
                ws.onclose = null;
                ws.close();
            }

            setStatus('reconnecting', 'Connecting...');

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/api/captions/stream/${currentVenue}`;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                // Status will be set properly when 'connected' message arrives with is_live
                reconnectAttempts = 0;
            };

            ws.onmessage = (event) => {
                try {
                    handleMessage(JSON.parse(event.data));
                } catch (e) {
                    console.error('Parse error:', e);
                }
            };

            ws.onclose = () => {
                setStatus('', 'Disconnected');
                scheduleReconnect();
            };

            ws.onerror = console.error;
        }

        function scheduleReconnect() {
            reconnectAttempts++;
            const delay = Math.min(1000 * Math.pow(2, Math.min(reconnectAttempts - 1, 5)), 30000);
            setTimeout(connect, delay);
        }

        function handleMessage(data) {
            if (data.type === 'keepalive') return;

            if (data.type === 'connected') {
                setStatus(data.is_live ? 'live' : 'offline',
                          data.is_live ? 'Connected · Live' : 'Connected · Offline');
                return;
            }

            if (data.type === 'venue_live') {
                setStatus('live', 'Connected · Live');
                return;
            }

            if (data.type === 'venue_offline') {
                setStatus('offline', 'Connected · Offline');
                return;
            }

            emptyStateEl.style.display = 'none';

            if (data.type === 'tentative') {
                updateTentative(data);
            } else if (data.type === 'committed') {
                commitSegment(data);
            } else if (data.type === 'session_end') {
                return; // status already updated via venue_offline
            }
        }

        function updateTentative(data) {
            let el = document.getElementById('tentative-segment');
            if (!el) {
                el = createCaptionElement(data, 'tentative');
                el.id = 'tentative-segment';
                captionsEl.appendChild(el);
            } else {
                el.querySelector('.caption-text').textContent = data.text;
            }
            scrollToBottom();
        }

        function commitSegment(data) {
            const tentative = document.getElementById('tentative-segment');
            if (tentative) tentative.remove();

            const el = createCaptionElement(data, 'committed');
            captionsEl.appendChild(el);

            trimCaptions();
            scrollToBottom();
        }

        function createCaptionElement(data, type) {
            const el = document.createElement('div');
            el.className = `caption-line ${type}`;

            const time = new Date().toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit'
            });

            el.innerHTML = `
                ${data.speaker ? `<div class="speaker-name">${escapeHtml(data.speaker)}</div>` : ''}
                <div class="caption-text">${escapeHtml(data.text)}</div>
                <div class="caption-time">${time}</div>
            `;

            return el;
        }

        function addSystemMessage(text) {
            const el = document.createElement('div');
            el.className = 'caption-line';
            el.style.opacity = '0.5';
            el.style.textAlign = 'center';
            el.style.borderLeft = 'none';
            el.innerHTML = `<div class="caption-text">\u2014 ${escapeHtml(text)} \u2014</div>`;
            captionsEl.appendChild(el);
            scrollToBottom();
        }

        function trimCaptions() {
            const lines = captionsEl.querySelectorAll('.caption-line');
            while (lines.length > maxCaptions) {
                lines[0].remove();
            }
        }

        function scrollToBottom() {
            window.scrollTo(0, document.body.scrollHeight);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        // Font size controls
        function updateFontSize(delta) {
            fontSize = Math.max(0.75, Math.min(2, fontSize + delta));
            localStorage.setItem('fontSize', fontSize);
            document.documentElement.style.setProperty('--caption-font-size', `${fontSize}rem`);
        }

        document.getElementById('fontIncrease').addEventListener('click', () => updateFontSize(0.125));
        document.getElementById('fontDecrease').addEventListener('click', () => updateFontSize(-0.125));

        // Theme toggle
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light', !isDarkMode);
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            document.getElementById('themeToggle').textContent = isDarkMode ? '\u{1F319}' : '\u2600\uFE0F';
        }

        document.getElementById('themeToggle').addEventListener('click', toggleTheme);

        // Initialize
        loadVenues();
        document.body.classList.toggle('light', !isDarkMode);
        document.documentElement.style.setProperty('--caption-font-size', `${fontSize}rem`);
        document.getElementById('themeToggle').textContent = isDarkMode ? '\u{1F319}' : '\u2600\uFE0F';
        connect();

        // Handle visibility
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && (!ws || ws.readyState !== WebSocket.OPEN)) {
                reconnectAttempts = 0;
                connect();
            }
        });
    </script>
</body>
</html>
