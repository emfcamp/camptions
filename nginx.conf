server {
    server_name stages.emf.camp;

    # HTTP configuration

    # HTTP to HTTPS
    if ($scheme != "https") {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host != captions.emf.camp) {
        return 301 https://captions.emf.camp$request_uri;
    }

    location / {
        proxy_pass  http://127.0.0.1:8000;
        proxy_redirect                      off;
        proxy_set_header  Host              $http_host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_read_timeout                  900;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/stages.emf.camp/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/stages.emf.camp/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


    location ~ ^/stage-[^/]+/(whip|whep) {
        proxy_pass http://localhost:8889;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_request_buffering off;
        proxy_redirect http://localhost:8889 https://$host;
    }



}
server {
    if ($host = stages.emf.camp) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name stages.emf.camp;
    listen 80;
    listen [::]:80;
    return 404; # managed by Certbot


}

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
